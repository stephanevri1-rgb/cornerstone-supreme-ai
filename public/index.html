<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cornerstone Supreme AI - Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0}
.container{display:flex;min-height:100vh}
.sidebar{width:260px;background:#1e293b;border-right:1px solid #334155;padding:20px 0;position:fixed;height:100vh;overflow-y:auto}
.sidebar .logo{padding:0 20px 20px;font-size:18px;font-weight:700;color:#38bdf8;border-bottom:1px solid #334155;margin-bottom:15px}
.sidebar .logo span{color:#94a3b8;font-size:12px;font-weight:400;display:block;margin-top:4px}
.nav-item{padding:12px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .2s;color:#94a3b8}
.nav-item:hover{background:#334155;color:#fff}
.nav-item.active{background:#2563eb;color:#fff}
.nav-item svg{width:18px;height:18px}
.nav-section{padding:15px 20px 5px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#64748b;font-weight:600}
.main{flex:1;margin-left:260px;padding:30px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}
.header h1{font-size:24px}
.status-badge{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;background:#059669;color:#fff}
.status-badge.offline{background:#dc2626}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-bottom:30px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px}
.card h3{font-size:14px;color:#94a3b8;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.card .value{font-size:32px;font-weight:700;color:#fff}
.card .change{font-size:13px;color:#059669;margin-top:5px}
.card .change.down{color:#dc2626}
.section{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:25px;margin-bottom:25px}
.section h2{font-size:18px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#059669;color:#fff}
.btn-danger{background:#dc2626;color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;text-align:left;border-bottom:1px solid #334155}
th{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;font-weight:600}
tr:hover td{background:#252f47}
td{font-size:14px}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#064e3b;color:#6ee7b7}
.badge-yellow{background:#78350f;color:#fcd34d}
.badge-blue{background:#1e3a5f;color:#7dd3fc}
.badge-red{background:#7f1d1d;color:#fca5a5}
input,select,textarea{width:100%;padding:10px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;margin-bottom:15px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#2563eb}
label{display:block;font-size:13px;color:#94a3b8;margin-bottom:5px;font-weight:500}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.hidden{display:none !important}
.empty-state{text-align:center;padding:40px;color:#64748b}
.empty-state svg{width:48px;height:48px;margin-bottom:15px;opacity:.5}
.load-btn{background:#2563eb;color:#fff;padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px}
.load-btn:hover{background:#1d4ed8}
.course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px}
.course-card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:18px;transition:all .2s}
.course-card:hover{border-color:#2563eb}
.course-card h4{font-size:15px;margin-bottom:8px}
.course-card .meta{font-size:13px;color:#94a3b8;margin-bottom:4px}
.course-card .price{font-size:16px;font-weight:700;color:#38bdf8;margin-top:10px}
.upload-area{border:2px dashed #334155;border-radius:10px;padding:30px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:20px}
.upload-area:hover{border-color:#2563eb;background:#1e293b}
.upload-area input{display:none}
.tabs{display:flex;gap:5px;margin-bottom:20px;border-bottom:1px solid #334155;padding-bottom:10px}
.tab{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:#94a3b8}
.tab:hover{color:#fff}
.tab.active{background:#2563eb;color:#fff}
.brochure-item{display:flex;align-items:center;justify-content:space-between;padding:12px;background:#0f172a;border:1px solid #334155;border-radius:8px;margin-bottom:8px}
.brochure-item .name{font-weight:500}
.brochure-item .actions{display:flex;gap:8px}
.alert{padding:12px 16px;border-radius:8px;margin-bottom:15px;font-size:14px}
.alert-success{background:#064e3b;color:#6ee7b7;border:1px solid #059669}
.alert-error{background:#7f1d1d;color:#fca5a5;border:1px solid #dc2626}
.settings-group{margin-bottom:25px;padding-bottom:25px;border-bottom:1px solid #334155}
.settings-group:last-child{border:none}
.settings-group h3{font-size:16px;margin-bottom:15px;color:#38bdf8}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #334155;border-top-color:#2563eb;border-radius:50%;animation:spin 1s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.footer-text{font-size:12px;color:#64748b;text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid #334155}
</style>
</head>
